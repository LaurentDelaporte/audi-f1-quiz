<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audi F1 Expert Quiz | Roadmap 2026</title>
    <style>
        :root {
            --audi-red: #f1052d;
            --audi-black: #000000;
            --audi-grey: #333333;
            --audi-silver: #f4f4f4;
            --success: #28a745;
            --error: #dc3545;
        }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--audi-black); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #quiz-container { background: #1a1a1a; width: 95%; max-width: 800px; padding: 40px; border-radius: 4px; border-left: 4px solid var(--audi-red); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        #timer { font-size: 1.8rem; color: var(--audi-red); font-weight: bold; text-align: right; margin-bottom: 10px; font-family: 'Courier New', monospace; }
        .question { font-size: 1.4rem; margin-bottom: 25px; line-height: 1.4; min-height: 80px; font-weight: 300; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { padding: 18px; border: 1px solid #444; background: #222; color: white; cursor: pointer; transition: 0.2s; font-size: 1rem; text-align: left; border-radius: 2px; }
        button:hover:not(:disabled) { background: var(--audi-grey); border-color: var(--audi-red); }
        button:disabled { cursor: default; }
        .correct { background: var(--success) !important; border-color: var(--success); font-weight: bold; }
        .wrong { background: var(--error) !important; border-color: var(--error); opacity: 0.8; }
        #insight-box { margin-top: 25px; padding: 20px; background: #252525; border-left: 3px solid var(--audi-red); display: none; animation: fadeIn 0.5s; }
        #insight-box h4 { margin: 0 0 10px 0; color: var(--audi-red); text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; }
        #next-btn { margin-top: 20px; background: var(--audi-red); color: white; border: none; padding: 12px 30px; cursor: pointer; float: right; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        #next-btn:hover { background: #c10424; }
        .progress-bar { height: 4px; background: #333; width: 100%; margin-bottom: 30px; }
        .progress-fill { height: 100%; background: var(--audi-red); width: 0%; transition: 0.4s; }
        #score-screen { text-align: center; display: none; }
        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @media (max-width: 600px) { .options { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="game-view">
        <div id="timer">30s</div>
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        <div id="question-text" class="question">Chargement des systèmes...</div>
        <div id="options-container" class="options"></div>
        
        <div id="insight-box">
            <h4>Expert Insight</h4>
            <p id="insight-text"></p>
            <button id="next-btn" onclick="loadNextQuestion()">Passer à l'analyse suivante →</button>
        </div>
    </div>

    <div id="score-screen">
        <h1 style="color: var(--audi-red); letter-spacing: 2px;">DEBRIEFING TERMINÉ</h1>
        <p>Analyse de vos connaissances techniques :</p>
        <p id="final-score" style="font-size: 4rem; margin: 20px 0; font-weight: bold;"></p>
        <button onclick="location.reload()" style="background: white; color: black; font-weight: bold; border: none; padding: 15px 40px; cursor: pointer; text-transform: uppercase;">Réinitialiser le simulateur</button>
    </div>
</div>

<script>
const quizData = [
    { q: "Où est situé le 'Competence Center Motorsport' d'Audi F1 ?", o: ["Ingolstadt", "Neuburg an der Donau", "Neckarsulm", "Hinwil"], a: 1, i: "C'est ici qu'Audi a développé ses moteurs pour le Mans et le Dakar." },
    { q: "Quelle est la puissance électrique cible (MGU-K) pour 2026 ?", o: ["120 kW", "250 kW", "350 kW", "500 kW"], a: 2, i: "La puissance électrique triple presque par rapport à la réglementation actuelle." },
    { q: "Qui est le Team Principal de l'écurie Audi F1 ?", o: ["Mattia Binotto", "Jonathan Wheatley", "Andreas Seidl", "Adam Baker"], a: 1, i: "Recruté chez Red Bull, il apporte une culture de victoire indispensable." },
    { q: "Quelle structure historique Audi a-t-elle rachetée à 100% ?", o: ["Williams", "McLaren", "Sauber", "Haas"], a: 2, i: "L'usine est basée à Hinwil, en Suisse, et dispose d'une soufflerie de pointe." },
    { q: "Quel moteur sera supprimé du règlement 2026 ?", o: ["Le V6 Turbo", "Le MGU-H", "Le MGU-K", "Le système ERS"], a: 1, i: "La suppression du MGU-H (récupération de chaleur) simplifie l'architecture moteur." },
    { q: "Quel pilote allemand a signé le premier contrat avec Audi ?", o: ["Sebastian Vettel", "Mick Schumacher", "Nico Hülkenberg", "Pascal Wehrlein"], a: 2, i: "Hülkenberg est réputé pour son excellente compréhension technique des monoplaces." },
    { q: "En quelle année l'entrée officielle d'Audi aura-t-elle lieu ?", o: ["2025", "2026", "2027", "2028"], a: 1, i: "2026 marque le début de la nouvelle ère hybride et des carburants durables." },
    { q: "Quel pourcentage de l'énergie sera d'origine électrique en 2026 ?", o: ["25%", "50%", "75%", "100%"], a: 1, i: "C'est une répartition 50/50 entre le moteur thermique et l'énergie électrique." },
    { q: "Qui est le PDG du projet moteur (Audi Formula Racing GmbH) ?", o: ["Adam Baker", "Oliver Hoffmann", "Gernot Döllner", "Stefan Dreyer"], a: 0, i: "Adam Baker supervise toute la conception de l'unité de puissance à Neuburg." },
    { q: "Quel carburant sera utilisé par Audi en 2026 ?", o: ["Bioéthanol", "Hydrogène", "E-fuel 100% durable", "Sans plomb 98"], a: 2, i: "Audi collabore sur des carburants synthétiques pour une neutralité carbone." },
    { q: "Quel est le poids minimal de l'ICE (moteur thermique) en 2026 ?", o: ["100 kg", "130 kg", "150 kg", "180 kg"], a: 1, i: "Le règlement fixe 130 kg pour éviter l'usage de métaux trop coûteux." },
    { q: "Quelle est la pression d'injection maximale autorisée (bar) ?", o: ["250 bar", "350 bar", "500 bar", "1000 bar"], a: 2, i: "Passer à 500 bar optimise la combustion des carburants durables." },
    { q: "Comment s'appelle l'ancêtre d'Audi aux Flèches d'Argent ?", o: ["Horch", "Auto Union", "DKW", "Wanderer"], a: 1, i: "Dans les années 30, Auto Union était le grand rival de Mercedes en Grand Prix." },
    { q: "Quel ancien directeur de Ferrari supervise le projet global ?", o: ["Stefano Domenicali", "Mattia Binotto", "Jean Todt", "Marco Mattiacci"], a: 1, i: "Mattia Binotto est le CTO (Chief Technical Officer) basé entre la Suisse et l'Allemagne." },
    { q: "Sur quel circuit le concept Audi F1 a-t-il été dévoilé ?", o: ["Silverstone", "Monza", "Spa-Francorchamps", "Shanghai"], a: 2, i: "L'annonce historique a été faite lors du GP de Belgique 2022." },
    { q: "Quel est le régime moteur maximal (RPM) pour 2026 ?", o: ["12 000", "15 000", "18 000", "20 000"], a: 1, i: "Le régime reste à 15 000 tr/min, mais l'efficacité est la priorité." },
    { q: "Quelle technologie Audi a-t-elle testée au Dakar ?", o: ["Moteur rotatif", "Convertisseur d'énergie", "Pneus sans air", "Active Aero"], a: 1, i: "Le RS Q e-tron utilisait un moteur DTM comme générateur pour ses batteries." },
    { q: "Combien de rapports possède la boîte de vitesses ?", o: ["6", "7", "8", "9"], a: 2, i: "8 rapports avant, standardisés pour réduire les coûts." },
    { q: "Quel est l'alésage fixe des cylindres imposé par la FIA ?", o: ["75 mm", "80 mm", "85 mm", "90 mm"], a: 1, i: "L'alésage de 80 mm est une contrainte stricte du règlement 2026." },
    { q: "Où se trouve la soufflerie utilisée par Audi ?", o: ["Ingolstadt", "Hinwil", "Brackley", "Cologne"], a: 1, i: "La soufflerie de Sauber à Hinwil est considérée comme l'une des meilleures au monde." },
    { q: "Quelle extension de bâtiment accueille les bancs d'essais ?", o: ["F1-Bau", "F7.2", "Paddock-Center", "Building 4"], a: 1, i: "Le bâtiment F7.2 est l'extension dédiée exclusivement au moteur F1." },
    { q: "Qui est le pilote de simulateur recruté en 2023 ?", o: ["Mick Schumacher", "Neel Jani", "Antonio Giovinazzi", "Robert Kubica"], a: 1, i: "Neel Jani aide à calibrer les systèmes hybrides complexes." },
    { q: "Quel est le débit massique de carburant maximal en 2026 ?", o: ["70 kg/h", "80 kg/h", "100 kg/h", "110 kg/h"], a: 1, i: "Le débit est réduit pour forcer une meilleure efficacité énergétique." },
    { q: "Quel matériau est interdit pour le carter moteur ?", o: ["Aluminium", "Titane", "Magnésium", "Acier"], a: 2, i: "Le magnésium est interdit pour les pièces structurelles du moteur." },
    { q: "Quelle est la tension du système électrique ?", o: ["400V", "800V", "1000V", "1200V"], a: 2, i: "La F1 travaille en haute tension (1000V) pour maximiser le rendement." },
    { q: "Combien de moteurs sont autorisés par saison ?", o: ["2", "3", "4", "5"], a: 1, i: "Le quota de 3 moteurs par an reste la norme de fiabilité." },
    { q: "Quel slogan Audi accompagne ce défi ?", o: ["Vorsprung durch Technik", "Future is an attitude", "Audi Power", "Unleash the rings"], a: 0, i: "L'avance par la technologie est au cœur du projet F1." },
    { q: "Quel composant de la batterie est standardisé ?", o: ["Le liquide de refroidissement", "Les cellules", "Le câblage", "Le BMS"], a: 1, i: "Toutes les écuries utiliseront des cellules de batterie identiques." },
    { q: "Quel est le poids minimal de l'unité de puissance ?", o: ["150 kg", "170 kg", "185 kg", "200 kg"], a: 2, i: "L'ensemble complet (ICE+ERS+Turbo) doit peser au moins 185 kg." },
    { q: "Combien d'énergie le MGU-K peut-il récupérer par tour ?", o: ["2 MJ", "4 MJ", "8 MJ", "9 MJ"], a: 3, i: "9 MJ est la limite de récupération d'énergie par tour en 2026." },
    { q: "Quel mode aérodynamique remplace le DRS ?", o: ["Z-Mode", "X-Mode", "Active-Drift", "Aero-Boost"], a: 1, i: "Le 'X-Mode' est le réglage de traînée minimale pour les lignes droites." },
    { q: "En quelle année Auto Union a gagné avec Bernd Rosemeyer ?", o: ["1934", "1936", "1938", "1940"], a: 1, i: "C'est l'année de gloire du Type C à moteur V16." },
    { q: "Quelle est la longueur maximale de la voiture en 2026 ?", o: ["3400 mm", "3600 mm", "3800 mm", "4000 mm"], a: 0, i: "Les monoplaces seront plus courtes pour favoriser les dépassements." },
    { q: "Quel ingénieur historique conseille le projet ?", o: ["Ulrich Baretzky", "Wolfgang Ullrich", "Joest", "Hans Stuck"], a: 0, i: "Baretzky est la légende des moteurs TDI du Mans." },
    { q: "Quel est l'empattement (wheelbase) maximal ?", o: ["3000 mm", "3200 mm", "3400 mm", "3600 mm"], a: 2, i: "L'empattement est réduit de 200 mm par rapport à 2025." },
    { q: "Quelle est la largeur de la voiture 2026 ?", o: ["1800 mm", "1900 mm", "2000 mm", "2100 mm"], a: 1, i: "Les voitures passent de 2 mètres à 1,90 mètre de large." },
    { q: "Comment s'appelle le nouveau CEO d'Audi ?", o: ["Markus Duesmann", "Gernot Döllner", "Herbert Diess", "Bram Schot"], a: 1, i: "Il a personnellement validé l'accélération du rachat de Sauber." },
    { q: "Quel type d'injecteur est utilisé ?", o: ["1 par cylindre", "2 par cylindre", "Indirect", "Libre"], a: 0, i: "L'injection directe unique est obligatoire." },
    { q: "Quel est le couple du moteur électrique ?", o: ["200 Nm", "350 Nm", "500 Nm", "Plus de 500 Nm"], a: 3, i: "Le couple instantané de l'électrique sera phénoménal en sortie de virage." },
    { q: "Où Audi a-t-elle ouvert son académie de pilotes ?", o: ["Allemagne", "Suisse", "Chine", "Monde entier"], a: 0, i: "Audi cherche déjà à former ses propres talents futurs." },
    { q: "Quel est le taux de compression maximal ?", o: ["14:1", "16:1", "18:1", "20:1"], a: 1, i: "Un taux de 16:1 est imposé pour limiter la recherche coûteuse." },
    { q: "Quelle est la température maximale du carburant ?", o: ["+10°C / ambiante", "20°C fixe", "50°C", "-10°C / ambiante"], a: 0, i: "Le règlement interdit de trop refroidir l'essence." },
    { q: "Quel type de turbo est utilisé en 2026 ?", o: ["Simple", "Double", "Électrique", "Variable"], a: 0, i: "Le turbo à étage simple est la seule option autorisée." },
    { q: "Quelle est la limite de consommation d'huile ?", o: ["0,2L / 100km", "0,5L / 100km", "1L / 100km", "Libre"], a: 0, i: "C'est pour empêcher de brûler l'huile comme boost de puissance." },
    { q: "Qui gère la communication Audi Motorsport ?", o: ["Stefan Moser", "Virginia Brusch", "Lukas Hasselberg", "Jürgen Pippig"], a: 1, i: "Elle coordonne l'image de marque du projet F1." },
    { q: "Combien de bancs d'essais compte Neuburg ?", o: ["10", "22", "35", "50"], a: 1, i: "Une installation massive pour garantir la fiabilité dès 2026." },
    { q: "Quel matériau est utilisé pour les pistons ?", o: ["Acier", "Aluminium", "Titane", "Céramique"], a: 1, i: "L'alliage d'aluminium forgé reste le standard thermique." },
    { q: "Quel est l'objectif carbone d'Audi F1 ?", o: ["2026", "2030", "2035", "2040"], a: 1, i: "Audi vise la neutralité carbone de ses opérations F1 dès 2030." },
    { q: "Quel partenaire fournit les lubrifiants ?", o: ["Castrol", "Mobil 1", "Shell", "Petronas"], a: 0, i: "Castrol est le partenaire historique de longue date." },
    { q: "Quelle est la durée de développement autorisée en soufflerie ?", o: ["Limitée par la FIA", "Illimitée", "100h / mois", "50h / mois"], a: 0, i: "Le temps est régi par le handicap de position au championnat." }
];

let currentIdx = 0;
let score = 0;
let timer;
let timeLeft = 30;

function startTimer() {
    timeLeft = 30;
    document.getElementById('timer').innerText = timeLeft + "s";
    timer = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').innerText = timeLeft + "s";
        if(timeLeft <= 0) {
            clearInterval(timer);
            revealAnswer(-1);
        }
    }, 1000);
}

function loadQuestion() {
    if(currentIdx >= quizData.length) {
        showFinalScore();
        return;
    }
    const q = quizData[currentIdx];
    document.getElementById('question-text').innerText = q.q;
    document.getElementById('insight-box').style.display = 'none';
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    
    q.o.forEach((opt, index) => {
        const btn = document.createElement('button');
        btn.innerText = opt;
        btn.onclick = () => revealAnswer(index);
        container.appendChild(btn);
    });

    document.getElementById('progress').style.width = `${(currentIdx / quizData.length) * 100}%`;
    startTimer();
}

function revealAnswer(selectedIdx) {
    clearInterval(timer);
    const correctIdx = quizData[currentIdx].a;
    const buttons = document.querySelectorAll('#options-container button');
    
    buttons.forEach((btn, i) => {
        btn.disabled = true;
        if(i === correctIdx) btn.classList.add('correct');
        if(i === selectedIdx && selectedIdx !== correctIdx) btn.classList.add('wrong');
    });

    if(selectedIdx === correctIdx) score++;
    
    document.getElementById('insight-text').innerText = quizData[currentIdx].i;
    document.getElementById('insight-box').style.display = 'block';
}

function loadNextQuestion() {
    currentIdx++;
    loadQuestion();
}

function showFinalScore() {
    document.getElementById('game-view').classList.add('hidden');
    document.getElementById('score-screen').style.display = 'block';
    document.getElementById('final-score').innerText = `${score} / ${quizData.length}`;
}

// Lancement automatique au chargement
window.onload = loadQuestion;
</script>
</body>
</html>
